cameras:
  - id: "001"
    device: "/dev/video0"
    location: "生产车间A区"
    width: 1280
    height: 720
    framerate: 60
    detector_scale: 1.0
    detector:
      confidence_threshold: 0.25
      nms_threshold: 0.45
      sampling_interval_ms: 100
      lock_duration_ms: 3000
      engine_path: "models/best.engine"
      worker_threads: 1
      max_queue_size: 4
    streamer:
      rtsp_url: "rtsp://localhost:8554/stream_001"  # rtsp://jetson-orin-nano:8554/stream_001
      http_url: "http://100.127.154.73:8889/jetson-stream1"
      scale: 1.0
      audio_device: "hw:0,0"
      framerate: 60
    monitor:
      window_seconds: 8
      trigger_frame_threshold: 80
      trigger_cooldown_seconds: 3
      upload_after_alarm_count: 3
      reset_alarm_count_after_upload: true
      alarm_count_reset_timeout_seconds: 30
      upload_server_url: "http://100.82.58.128:5001/capture/upload"
      upload_timeout_seconds: 10
      fire_alarm_audio_file: "assets/alarm.wav"
      smoking_alarm_audio_file: "assets/smoking_alarm0.wav"

