cameras:
  - id: "001"
    device: "/dev/video0"
    location: "生产车间A区"
    width: 1920
    height: 1080
    framerate: 30
    detector:
      confidence_threshold: 0.25
      nms_threshold: 0.5
      engine_path: "models/best.engine"
      worker_threads: 1
      max_queue_size: 8
    streamer:
      rtsp_url: "rtsp://localhost:8554/stream_001"  # rtsp://jetson-orin-nano:8554/stream_001
      http_url: "http://fnas:8889/jetson-stream1"
      scale: 1.0
      audio_device: "hw:0,0"
      framerate: 30

