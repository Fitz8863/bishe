cameras:
  - id: "001"
    device: "/dev/video0"
    location: "生产车间A区"
    width: 1920
    height: 1080
    framerate: 30
    detector:
      confidence_threshold: 0.25
      nms_threshold: 0.45
      engine_path: "models/best.engine"
      worker_threads: 1
      max_queue_size: 4
      sampling_interval_ms: 1000
      lock_duration_ms: 3000
    streamer:
      rtsp_url: "rtsp://localhost:8554/stream_001"  # rtsp://jetson-orin-nano:8554/stream_001
      http_url: "http://fnas:8889/jetson-stream1"
      scale: 1.0
      audio_device: "hw:0,0"
      framerate: 30
    monitor:
      window_seconds: 8
      trigger_frame_threshold: 30
      trigger_cooldown_seconds: 2
      upload_after_alarm_count: 3
      reset_alarm_count_after_upload: true
      alarm_count_reset_timeout_seconds: 30
      upload_server_url: "http://amd64:5001/capture/upload"
      upload_timeout_seconds: 10
      fire_alarm_audio_file: "assets/alarm.wav"
      smoking_alarm_audio_file: "assets/smoking_alarm0.wav"

