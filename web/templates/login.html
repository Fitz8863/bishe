<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 化工厂危险行为检测系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/bootstrap.min.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #020617;
            --bg-card: #1e293b;
            --primary-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }
        
        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Inter", -apple-system, sans-serif;
            color: var(--text-primary);
        }
        
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            background: #0f172a;
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        
        .login-header h3 {
            color: var(--primary-color);
            font-weight: 800;
            font-size: 1.25rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .login-header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .login-body {
            padding: 2.5rem 2rem;
        }
        
        .form-control {
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            background: #0f172a;
            color: var(--text-primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        
        .form-label {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        
        .btn-login {
            background: var(--primary-color);
            border: none;
            color: #020617;
            padding: 0.75rem;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            background: #7dd3fc;
            transform: translateY(-1px);
        }
        
        .alert {
            font-size: 0.85rem;
            border: 1px solid transparent;
            background: #0f172a;
        }
        
        .alert-danger {
            color: #fca5a5;
            border-color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h3>System Access</h3>
            <p>化工危险行为检测系统 · 身份认证</p>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1);"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-2"></i>用户名</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock me-2"></i>密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="remember" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">记住我</label>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>登 录
                </button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='bootstrap/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
