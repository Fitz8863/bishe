{% extends "base.html" %}

{% block title %}首页 - 化工厂危险行为检测系统{% endblock %}

{% block content %}
<div class="container-fluid fade-in">
    <div class="row mb-4 align-items-center">
        <div class="col-md-8">
            <h2 class="fw-bold mb-1 text-white">
                <i class="fas fa-shield-alt me-2 text-primary"></i>监控数据概览
            </h2>
            <p class="text-secondary small mb-0">化工厂安全行为实时检测系统 · <span class="text-success fw-bold">运行中</span></p>
        </div>
        <div class="col-md-4 text-end">
            <div class="d-inline-flex align-items-center px-3 py-1 border border-secondary rounded">
                <div class="me-3 text-start">
                    <div class="x-small text-secondary text-uppercase fw-bold" style="font-size: 0.65rem; letter-spacing: 0.05em;">System Time</div>
                    <div class="fw-bold text-primary" id="clock" style="font-family: monospace;">00:00:00</div>
                </div>
                <i class="fas fa-clock text-secondary opacity-50"></i>
            </div>
        </div>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-md-3">
            <div class="card p-3">
                <div class="stat-label mb-1">总摄像头</div>
                <div class="stat-number" id="cameraCount">-</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-start border-4 border-success">
                <div class="stat-label mb-1">在线设备</div>
                <div class="stat-number text-success" id="onlineCount">-</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-start border-4 border-warning">
                <div class="stat-label mb-1">累计抓拍</div>
                <div class="stat-number text-warning" id="captureCount">-</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-start border-4 border-danger">
                <div class="stat-label mb-1">今日告警</div>
                <div class="stat-number text-danger" id="todayCount">-</div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-lg-8">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-chart-line me-2"></i>告警趋势分析</span>
                    <span class="badge bg-secondary rounded-0 x-small">实时统计</span>
                </div>
                <div class="card-body p-0">
                    <div id="trendChart" style="height: 350px; width: 100%;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-header">
                    <span><i class="fas fa-chart-pie me-2"></i>违规类型分布</span>
                </div>
                <div class="card-body p-0">
                    <div id="typeChart" style="height: 350px; width: 100%;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <span><i class="fas fa-map-marker-alt me-2"></i>高危风险区域</span>
                </div>
                <div class="card-body p-0">
                    <div id="locationChart" style="height: 300px; width: 100%;"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-8 mb-4">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-history me-2"></i>最新告警流水</span>
                    <a href="{{ url_for('main.alerts') }}" class="btn btn-sm btn-outline-light py-0">明细 <i class="fas fa-chevron-right ms-1" style="font-size: 0.7rem;"></i></a>
                </div>
                <div id="recentActivity" class="list-group list-group-flush bg-transparent">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    .text-gradient {
        background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent-color) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .glass-card {
        background: rgba(25, 25, 35, 0.4);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .stat-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: 18px;
        padding: 20px;
        transition: all 0.3s ease;
        height: 100%;
        overflow: hidden;
        position: relative;
    }

    .stat-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary-color);
        box-shadow: 0 10px 25px rgba(244, 114, 182, 0.15);
        background: rgba(255, 255, 255, 0.05);
    }

    .stat-card-body {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: white;
    }

    .bg-info-gradient { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
    .bg-success-gradient { background: linear-gradient(135deg, #10b981, #059669); }
    .bg-warning-gradient { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .bg-danger-gradient { background: linear-gradient(135deg, #ef4444, #dc2626); }

    .stat-value {
        font-size: 1.8rem;
        font-weight: 800;
        line-height: 1.2;
    }

    .stat-label {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .chart-container {
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .chart-header {
        padding: 15px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .activity-item {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        border-radius: 12px;
        transition: all 0.3s ease;
        margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.02);
    }

    .activity-item:hover {
        background: rgba(255, 255, 255, 0.05);
    }

    .activity-thumb {
        width: 60px;
        height: 40px;
        object-fit: cover;
        border-radius: 6px;
        margin-right: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .activity-info { flex: 1; min-width: 0; }
    .activity-type { font-weight: bold; font-size: 0.85rem; color: #fb7185; }
    .activity-loc { font-size: 0.75rem; color: var(--text-secondary); }
    .activity-time { font-size: 0.7rem; color: rgba(255, 255, 255, 0.3); white-space: nowrap; }

    #clock {
        font-family: 'Courier New', Courier, monospace;
        letter-spacing: 1px;
        color: var(--primary-light);
    }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script>
    let trendChart, typeChart, locationChart;

    document.addEventListener('DOMContentLoaded', function() {
        initCharts();
        loadDashboardData();
        startClock();
        
        // 监听 Socket.IO 事件以更新图表
        if (typeof socket !== 'undefined') {
            socket.on('new_capture', () => {
                console.log('Dashboard updating via WebSocket...');
                loadDashboardData();
            });
        }
        
        // 每 5 秒刷新 MQTT 设备统计
        setInterval(() => {
            fetch('/settings/api/mqtt/realtime-stats')
                .then(res => res.json())
                .then(data => {
                    if (data.connected) {
                        document.getElementById('cameraCount').textContent = data.camera_count;
                        document.getElementById('onlineCount').textContent = data.device_count;
                    } else {
                        document.getElementById('cameraCount').innerHTML = '<span class="x-small">未连接</span>';
                        document.getElementById('onlineCount').innerHTML = '<span class="x-small">未连接</span>';
                    }
                })
                .catch(() => {});
        }, 5000);
    });

    function startClock() {
        const update = () => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        };
        setInterval(update, 1000);
        update();
    }

    function initCharts() {
        const themeColor = '#38bdf8'; // 主色蓝
        const accentColor = '#94a3b8'; // 辅助色

        const commonOption = {
            backgroundColor: 'transparent',
            textStyle: { color: '#94a3b8', fontFamily: 'monospace' }
        };

        // 1. 趋势图
        trendChart = echarts.init(document.getElementById('trendChart'));
        trendChart.setOption({
            ...commonOption,
            tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#fff' } },
            grid: { top: 40, bottom: 40, left: 50, right: 30 },
            xAxis: { 
                type: 'category', 
                data: [], 
                axisLine: { lineStyle: { color: '#334155' } } 
            },
            yAxis: { 
                type: 'value', 
                splitLine: { lineStyle: { color: '#1e293b' } } 
            },
            series: [{
                data: [],
                type: 'line',
                smooth: true,
                symbol: 'square',
                symbolSize: 6,
                itemStyle: { color: themeColor },
                lineStyle: { width: 2 },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(56, 189, 248, 0.1)' },
                        { offset: 1, color: 'rgba(56, 189, 248, 0)' }
                    ])
                }
            }]
        });

        // 2. 类型分布
        typeChart = echarts.init(document.getElementById('typeChart'));
        typeChart.setOption({
            ...commonOption,
            tooltip: { trigger: 'item' },
            legend: { bottom: '10', textStyle: { color: '#94a3b8', fontSize: 10 }, icon: 'rect' },
            series: [{
                name: '违规类型',
                type: 'pie',
                radius: ['45%', '65%'],
                itemStyle: { borderColor: '#1e293b', borderWidth: 2 },
                label: { show: false },
                data: []
            }]
        });

        // 3. 地点排行
        locationChart = echarts.init(document.getElementById('locationChart'));
        locationChart.setOption({
            ...commonOption,
            tooltip: { trigger: 'axis' },
            grid: { top: 20, bottom: 20, left: 80, right: 40 },
            xAxis: { type: 'value', show: false },
            yAxis: { 
                type: 'category', 
                data: [], 
                axisLine: { show: false },
                axisTick: { show: false }
            },
            series: [{
                type: 'bar',
                data: [],
                itemStyle: { color: themeColor },
                barWidth: 12,
                label: { show: true, position: 'right', color: '#94a3b8', fontSize: 10, fontFamily: 'monospace' }
            }]
        });

        window.addEventListener('resize', () => {
            trendChart.resize();
            typeChart.resize();
            locationChart.resize();
        });
    }

    function loadDashboardData() {
        // 从 MQTT 获取实时设备统计（在线设备数、摄像头数）
        fetch('/settings/api/mqtt/realtime-stats')
            .then(res => res.json())
            .then(data => {
                if (data.connected) {
                    document.getElementById('cameraCount').textContent = data.camera_count;
                    document.getElementById('onlineCount').textContent = data.device_count;
                } else {
                    document.getElementById('cameraCount').innerHTML = '<span class="x-small">未连接</span>';
                    document.getElementById('onlineCount').innerHTML = '<span class="x-small">未连接</span>';
                }
            })
            .catch(() => {
                document.getElementById('cameraCount').innerHTML = '<span class="x-small">未连接</span>';
                document.getElementById('onlineCount').innerHTML = '<span class="x-small">未连接</span>';
            });

        // 加载列表基础数据
        fetch('/capture/list?per_page=5')
            .then(res => res.json())
            .then(data => {
                const captures = data.captures || [];
                const total = data.pagination?.total || 0;
                document.getElementById('captureCount').textContent = total;
                
                // 计算今日告警
                const today = new Date().toISOString().split('T')[0];
                fetch(`/capture/list?start_time=${today}T00:00&per_page=1`)
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('todayCount').textContent = data.pagination?.total || 0;
                    });

                renderRecentActivity(captures);
            });

        // 加载 ECharts 统计数据
        fetch('/capture/api/stats')
            .then(res => res.json())
            .then(data => {
                updateCharts(data);
            });
    }

    function updateCharts(data) {
        // 更新趋势图
        const trendKeys = Object.keys(data.trends).sort();
        trendChart.setOption({
            xAxis: { data: trendKeys },
            series: [{ data: trendKeys.map(k => data.trends[k]) }]
        });

        // 更新类型图
        const typeData = Object.entries(data.types).map(([name, value]) => ({ name, value }));
        typeChart.setOption({
            series: [{ data: typeData }]
        });

        // 更新地点图
        const locEntries = Object.entries(data.locations).sort((a, b) => a[1] - b[1]);
        locationChart.setOption({
            yAxis: { data: locEntries.map(e => e[0]) },
            series: [{ data: locEntries.map(e => e[1]) }]
        });
    }

    function renderRecentActivity(captures) {
        const container = document.getElementById('recentActivity');
        if (captures.length === 0) {
            container.innerHTML = '<div class="text-center text-muted p-4">暂无告警记录</div>';
            return;
        }

        let html = '';
        captures.forEach(c => {
            const timeStr = c.capture_time.split(' ')[1];
            html += `
                <div class="list-group-item bg-transparent border-secondary border-opacity-10 d-flex align-items-center py-2 px-3">
                    <img src="/static/${c.thumbnail_path || c.image_path}" style="width: 50px; height: 34px; object-fit: cover; border: 1px solid #334155;">
                    <div class="ms-3 flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-white" style="font-size: 0.85rem;">${c.violation_type}</span>
                            <span class="x-small text-secondary" style="font-family: monospace;">${timeStr}</span>
                        </div>
                        <div class="x-small text-secondary mt-1"><i class="fas fa-map-marker-alt me-1"></i>${c.location}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
</script>
{% endblock %}
